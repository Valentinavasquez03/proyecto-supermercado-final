{% extends 'index.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom border-secondary">
    <h1 class="h3 text-white fw-bold"><i class="bi bi-trash text-danger me-2"></i>HU06 — Confirmar Eliminación</h1>
</div>

<div class="card card-custom p-5 shadow text-center mx-auto" style="max-width: 500px;">
    <i class="bi bi-exclamation-octagon text-danger display-3 mb-3"></i>
    <h4 class="text-white fw-bold">¿Estás seguro de eliminar el artículo?</h4>
    <p class="text-muted mb-4">Vas a borrar de forma permanente: <strong class="text-white">"{{ producto.nombre }}"</strong></p>
    
    <form action="/products/{{ producto._id }}/delete" method="POST">
        <div class="d-flex gap-3 justify-content-center">
            <a href="/products/search" class="btn btn-secondary px-4 py-2 fw-bold">Regresar</a>
            <button type="submit" class="btn btn-danger px-4 py-2 fw-bold">Confirmar Borrado</button>
        </div>
    </form>
</div>
{% endblock %}
