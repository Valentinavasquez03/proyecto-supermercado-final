{% extends 'index.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom border-secondary">
    <h1 class="h3 text-white fw-bold"><i class="bi bi-plus-circle text-success me-2"></i>HU02 — Registrar Nuevo Producto</h1>
</div>

<div class="card card-custom p-4 shadow" style="max-width: 700px;">
    <form action="/products/new" method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nombre del Producto *</label>
                <input type="text" class="form-control form-dark" name="nombre" placeholder="Ej. Arroz" required autocomplete="off">
            </div>
            <div class="col-md-6">
                <label class="form-label">Categoría *</label>
                <select class="form-select form-dark" name="categoria" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="Lacteos">Lácteos</option>
                    <option value="Carnes">Carnes</option>
                    <option value="Abarrotes">Abarrotes</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Precio Unitario ($) *</label>
                <input type="number" step="0.01" class="form-control form-dark" name="precio" placeholder="0.00" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Stock Inicial * (HU03)</label>
                <input type="number" class="form-control form-dark" name="stock" placeholder="Cantidad" required>
            </div>
            <div class="col-12">
                <label class="form-label">URL de la Imagen (Opcional - Opción A Magistrada)</label>
                <input type="url" class="form-control form-dark" name="imagen" placeholder="https://ejemplo.com/imagen.jpg">
            </div>
            <div class="col-12">
                <label class="form-label">Descripción</label>
                <textarea class="form-control form-dark" name="descripcion" rows="3" placeholder="Detalles del artículo..."></textarea>
            </div>
            <div class="col-12 pt-2">
                <button type="submit" class="btn btn-success w-100 fw-bold py-2"><i class="bi bi-save"></i> Guardar en Inventario</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
