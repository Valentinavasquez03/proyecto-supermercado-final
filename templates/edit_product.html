{% extends 'index.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom border-secondary">
    <h1 class="h3 text-white fw-bold"><i class="bi bi-pencil-square text-warning me-2"></i>HU03 — Actualizar Atributos de Producto</h1>
</div>

<div class="card card-custom p-4 shadow mx-auto" style="max-width: 700px;">
    <form action="/products/{{ producto._id }}/edit" method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nombre del Producto *</label>
                <input type="text" class="form-control form-dark" name="nombre" value="{{ producto.nombre }}" required autocomplete="off">
            </div>
            <div class="col-md-6">
                <label class="form-label">Categoría *</label>
                <select class="form-select form-dark" name="categoria" required>
                    <option value="Lacteos" {% if producto.categoria == 'Lacteos' %}selected{% endif %}>Lácteos</option>
                    <option value="Carnes" {% if producto.categoria == 'Carnes' %}selected{% endif %}>Carnes</option>
                    <option value="Abarrotes" {% if producto.categoria == 'Abarrotes' %}selected{% endif %}>Abarrotes</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Precio ($) *</label>
                <input type="number" step="0.01" class="form-control form-dark" name="precio" value="{{ producto.precio }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Stock Actual *</label>
                <input type="number" class="form-control form-dark" name="stock" value="{{ producto.stock }}" required>
            </div>
            <div class="col-12">
                <label class="form-label">URL de la Imagen</label>
                <input type="url" class="form-control form-dark" name="imagen" value="{{ producto.imagen }}">
            </div>
            <div class="col-12">
                <label class="form-label">Descripción</label>
                <textarea class="form-control form-dark" name="descripcion" rows="3">{{ producto.descripcion }}</textarea>
            </div>
            <div class="col-12 d-flex gap-3 pt-2">
                <a href="/products/search" class="btn btn-secondary w-50 fw-bold">Cancelar</a>
                <button type="submit" class="btn btn-warning w-50 fw-bold text-dark"><i class="bi bi-arrow-clockwise"></i> Modificar Producto</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
