<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SuperMercado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background-color: #111827;
            border: 1px solid #1f2937;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .form-control-custom {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
        }
        .form-control-custom:focus {
            background-color: #1f2937;
            border-color: #10b981;
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
        .form-label-custom {
            color: #9ca3af; /* Gris claro perfectamente visible */
            font-weight: 500;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="mb-3">
        <i class="bi bi-shield-lock-fill text-success" style="font-size: 3rem;"></i>
    </div>
    
    <h3 class="fw-bold text-white mb-2">Iniciar Sesión</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-danger py-2 small mb-3 border-0 text-start" style="background-color: rgba(239, 68, 68, 0.15); color: #f87171;">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST" class="text-start">
        <div class="mb-3">
            <label class="form-label form-label-custom">Usuario</label>
            <input type="text" class="form-control form-control-custom" name="username" placeholder="Ej. admin" required autocomplete="off">
        </div>
        <div class="mb-4">
            <label class="form-label form-label-custom">Contraseña</label>
            <input type="password" class="form-control form-control-custom" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2.5 fw-bold" style="background-color: #10b981; border: none; border-radius: 8px;">
            Entrar al Sistema <i class="bi bi-box-arrow-in-right ms-1"></i>
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
